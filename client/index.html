<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>House Price Predictor – Bangalore</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- Decorative blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-wrapper">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="header-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <polyline points="9 21 9 12 15 12 15 21"/>
          </svg>
        </div>
        <div>
          <h1 class="card-title">House Price Predictor</h1>
          <p class="card-subtitle">Bangalore Real Estate </p>
        </div>
      </div>

      <!-- Area -->
      <div class="field-group">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Area (Square Feet)
        </label>
        <div class="input-wrap">
          <input type="number" id="uiSqft" value="1000" min="100" placeholder="e.g. 1200" />
          <span class="input-unit">sq ft</span>
        </div>
      </div>

      <!-- BHK -->
      <div class="field-group">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16M2 8h18a2 2 0 0 1 2 2v10M2 16h20"/></svg>
          BHK
        </label>
        <div class="toggle-group" id="bhkGroup">
          <button class="toggle-btn" data-name="uiBHK" data-value="1">1</button>
          <button class="toggle-btn active" data-name="uiBHK" data-value="2">2</button>
          <button class="toggle-btn" data-name="uiBHK" data-value="3">3</button>
          <button class="toggle-btn" data-name="uiBHK" data-value="4">4</button>
          <button class="toggle-btn custom-trigger" data-name="uiBHK" data-value="custom" data-target="bhkCustomWrap">5+</button>
        </div>
        <div class="custom-input-wrap hidden" id="bhkCustomWrap">
          <input type="number" id="bhkCustom" class="custom-input" min="5" max="20" placeholder="Enter BHK (e.g. 6)" />
        </div>
      </div>

      <!-- Bath -->
      <div class="field-group">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20M2 12a10 10 0 0 0 20 0M6 12V4a2 2 0 0 1 4 0v1"/></svg>
          Bathrooms
        </label>
        <div class="toggle-group" id="bathGroup">
          <button class="toggle-btn" data-name="uiBathrooms" data-value="1">1</button>
          <button class="toggle-btn" data-name="uiBathrooms" data-value="2">2</button>
          <button class="toggle-btn active" data-name="uiBathrooms" data-value="3">3</button>
          <button class="toggle-btn" data-name="uiBathrooms" data-value="4">4</button>
          <button class="toggle-btn custom-trigger" data-name="uiBathrooms" data-value="custom" data-target="bathCustomWrap">5+</button>
        </div>
        <div class="custom-input-wrap hidden" id="bathCustomWrap">
          <input type="number" id="bathCustom" class="custom-input" min="5" max="20" placeholder="Enter bathrooms (e.g. 6)" />
        </div>
      </div>

      <!-- Location -->
      <div class="field-group">
        <label class="field-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Location
        </label>
        <div class="select-wrap">
          <svg class="select-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <select id="uiLocations">
            <option value="">Select a location…</option>
          </select>
          <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <!-- CTA -->
      <button class="cta-btn" id="estimateBtn" onclick="onClickedEstimatePrice()">
        <span id="btnLabel">Estimate Price</span>
        <div class="spinner hidden" id="spinner"></div>
      </button>

      <!-- Result -->
      <div class="result-card hidden" id="resultCard">
        <div class="result-price-row">
          <div>
            <p class="result-label">Estimated Price</p>
            <p class="result-price" id="resultPrice">—</p>
          </div>
          <div class="result-badge">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          </div>
        </div>

        <div class="result-range" id="resultRange">Range: — – —</div>

        <!-- Bar chart -->
        <div class="chart-wrap">
          <div class="chart-bars">
            <div class="bar-col">
              <div class="bar-track">
                <div class="bar low-bar" id="barLow"></div>
              </div>
              <span class="bar-label" id="labelLow">—</span>
              <span class="bar-tag">Low</span>
            </div>
            <div class="bar-col">
              <div class="bar-track">
                <div class="bar pred-bar" id="barPred"></div>
              </div>
              <span class="bar-label" id="labelPred">—</span>
              <span class="bar-tag">Predicted</span>
            </div>
            <div class="bar-col">
              <div class="bar-track">
                <div class="bar high-bar" id="barHigh"></div>
              </div>
              <span class="bar-label" id="labelHigh">—</span>
              <span class="bar-tag">High</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
